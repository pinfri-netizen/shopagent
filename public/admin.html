<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopAgent Admin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080f;--bg2:#10101a;--bg3:#181826;--bg4:#1e1e2e;
  --border:#252535;--border2:#303045;
  --accent:#6c63ff;--accent-glow:rgba(108,99,255,.12);
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;--teal:#06b6d4;
  --t1:#f0f0ff;--t2:#a0a0c0;--t3:#60607a;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
.hidden{display:none!important}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px;width:340px;text-align:center}
.login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;margin-bottom:6px}
.login-logo span{color:var(--accent)}
.login-sub{font-size:13px;color:var(--t3);margin-bottom:20px}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:12px 14px;color:var(--t1);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:12px}
.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;background:var(--accent);color:white;border:none;padding:12px;border-radius:8px;cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500}
.login-btn:hover{background:#7c74ff}
.login-err{color:var(--red);font-size:13px;margin-top:10px;min-height:20px}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:20px 14px;position:sticky;top:0;height:100vh}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;margin-bottom:24px;padding:0 8px}
.logo span{color:var(--accent)}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--t2);font-size:13px;cursor:pointer;margin-bottom:2px;transition:all .15s;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--t1)}
.nav-item.active{background:var(--accent-glow);color:var(--accent)}
.main{padding:28px 32px;overflow-x:hidden}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}
.refresh-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--t2);padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.refresh-btn:hover{color:var(--t1);border-color:var(--accent)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px}
.stat-label{font-size:12px;color:var(--t3);margin-bottom:8px}
.stat-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800}
.stat-sub{font-size:11px;color:var(--t3);margin-top:4px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:20px}
.panel-title{font-size:14px;font-weight:500;margin-bottom:14px;color:var(--t1)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--t3);font-weight:400;padding:8px 10px;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
td{padding:10px 10px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--t2)}
td.strong{color:var(--t1);font-weight:500}
tr:last-child td{border-bottom:none}
.badge{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:500}
.badge-green{background:rgba(34,197,94,.12);color:#22c55e}
.badge-blue{background:rgba(6,182,212,.12);color:#06b6d4}
.badge-amber{background:rgba(245,158,11,.12);color:#f59e0b}
.badge-gray{background:rgba(255,255,255,.08);color:var(--t3)}
.empty{text-align:center;color:var(--t3);padding:30px;font-size:13px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.loading{text-align:center;padding:60px;color:var(--t3);font-size:14px}
@media(max-width:768px){.stats-grid{grid-template-columns:1fr 1fr}.grid-2{grid-template-columns:1fr}.layout{grid-template-columns:1fr}.sidebar{display:none}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">Shop<span>Agent</span></div>
    <div class="login-sub">Admin Dashboard</div>
    <input type="password" id="admin-pass" class="login-input" placeholder="Enter admin password" autocomplete="current-password">
    <button class="login-btn" id="login-btn">Sign in →</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="layout hidden">
  <div class="sidebar">
    <div class="logo">Shop<span>Agent</span></div>
    <div class="nav-item active" id="nav-dashboard" onclick="switchPage('dashboard')"><span>📊</span> Dashboard</div>
    <div class="nav-item" id="nav-customers" onclick="switchPage('customers')"><span>👥</span> Customers</div>
    <div class="nav-item" id="nav-orders" onclick="switchPage('orders')"><span>📦</span> Orders</div>
    <div class="nav-item" id="nav-costs" onclick="switchPage('costs')"><span>💰</span> Costs & profit</div>
  </div>
  <div class="main">
    <div class="page-header">
      <h1 id="page-title">Dashboard</h1>
      <button class="refresh-btn" onclick="refreshPage()">↻ Refresh</button>
    </div>
    <div id="content"><div class="loading">Loading...</div></div>
  </div>
</div>

<script>
var BASE = window.location.origin;
var PASS = "shopagent2026";
var currentPage = "dashboard";
var cachedData = {};

function $(id) { return document.getElementById(id); }

// ── LOGIN ──────────────────────────────────────────────
function doLogin() {
  var val = $("admin-pass").value;
  if (!val) { $("login-err").textContent = "Please enter the password"; return; }
  if (val === PASS) {
    $("login-screen").classList.add("hidden");
    $("dashboard").classList.remove("hidden");
    $("login-err").textContent = "";
    loadDashboard();
  } else {
    $("login-err").textContent = "Wrong password — try shopagent2026";
    $("admin-pass").value = "";
    $("admin-pass").focus();
  }
}

$("login-btn").addEventListener("click", doLogin);
$("admin-pass").addEventListener("keydown", function(e) { if (e.key === "Enter") doLogin(); });

// ── PAGE ROUTING ───────────────────────────────────────
function switchPage(page) {
  currentPage = page;
  document.querySelectorAll(".nav-item").forEach(function(el) { el.classList.remove("active"); });
  var navEl = $("nav-" + page);
  if (navEl) navEl.classList.add("active");
  var titles = { dashboard: "Dashboard", customers: "Customers", orders: "Orders", costs: "Costs & profit" };
  $("page-title").textContent = titles[page] || page;
  if (page === "dashboard") loadDashboard();
  else if (page === "customers") loadCustomers();
  else if (page === "orders") loadOrders();
  else if (page === "costs") loadCosts();
}

function refreshPage() { switchPage(currentPage); }

// ── HELPERS ────────────────────────────────────────────
function fmtMoney(n) { return "$" + (parseFloat(n) || 0).toFixed(2); }
function fmtDate(d) { return d ? new Date(d).toLocaleDateString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }) : "—"; }
function truncate(s, n) { return s ? (s.length > n ? s.slice(0, n) + "…" : s) : "—"; }
function statusBadge(s) {
  var map = { processing: "badge-blue", placed: "badge-blue", delivered: "badge-green", confirmed: "badge-green", active: "badge-green", new: "badge-gray" };
  return '<span class="badge ' + (map[s] || "badge-gray") + '">' + (s || "—") + '</span>';
}
function statCard(label, val, sub) {
  return '<div class="stat-card"><div class="stat-label">' + label + '</div><div class="stat-val">' + val + '</div><div class="stat-sub">' + sub + '</div></div>';
}
function setContent(html) { $("content").innerHTML = html; }

// ── DASHBOARD PAGE ─────────────────────────────────────
async function loadDashboard() {
  setContent('<div class="loading">Loading dashboard...</div>');
  try {
    var res = await fetch(BASE + "/api/admin/stats");
    if (!res.ok) throw new Error("Server returned " + res.status);
    var data = await res.json();
    if (data.error) throw new Error(data.error);
    cachedData.stats = data;
    renderDashboard(data);
  } catch (e) {
    setContent('<div class="empty">Error loading dashboard: ' + e.message + '</div>');
  }
}

function renderDashboard(data) {
  var c = data.customers || {};
  var o = data.orders || {};
  var calls = data.calls || {};
  var html = '';

  html += '<div class="stats-grid">';
  html += statCard("Customers", c.total || 0, (c.active || 0) + " active");
  html += statCard("Orders", o.total || 0, (o.processing || 0) + " processing");
  html += statCard("Revenue", fmtMoney(c.total_revenue), "lifetime spend");
  html += statCard("Minutes sold", c.total_minutes || 0, (calls.total_calls || 0) + " calls");
  html += '</div>';

  html += '<div class="grid-2">';
  html += '<div class="panel"><div class="panel-title">Recent orders</div>';
  var recentOrders = data.recentOrders || [];
  if (recentOrders.length === 0) {
    html += '<div class="empty">No orders yet</div>';
  } else {
    html += '<table><thead><tr><th>Product</th><th>Price</th><th>Status</th><th>Date</th></tr></thead><tbody>';
    recentOrders.forEach(function(o) {
      html += '<tr><td class="strong">' + truncate(o.product_title, 26) + '</td><td>' + (o.product_price || "—") + '</td><td>' + statusBadge(o.status) + '</td><td>' + fmtDate(o.created_at) + '</td></tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div>';

  html += '<div class="panel"><div class="panel-title">Recent customers</div>';
  var recentCustomers = data.recentCustomers || [];
  if (recentCustomers.length === 0) {
    html += '<div class="empty">No customers yet</div>';
  } else {
    html += '<table><thead><tr><th>Phone</th><th>Balance</th><th>Orders</th><th>Joined</th></tr></thead><tbody>';
    recentCustomers.forEach(function(cu) {
      html += '<tr><td class="strong">' + (cu.phone || "—") + '</td><td>' + (cu.balance_minutes || 0) + ' min</td><td>' + (cu.total_orders || 0) + '</td><td>' + fmtDate(cu.created_at) + '</td></tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div>';
  html += '</div>';

  setContent(html);
}

// ── CUSTOMERS PAGE ─────────────────────────────────────
async function loadCustomers() {
  setContent('<div class="loading">Loading customers...</div>');
  try {
    var res = await fetch(BASE + "/api/admin/customers");
    if (!res.ok) throw new Error("Server returned " + res.status);
    var customers = await res.json();
    renderCustomers(customers);
  } catch (e) {
    setContent('<div class="empty">Error: ' + e.message + '</div>');
  }
}

function renderCustomers(customers) {
  var html = '<div class="panel"><div class="panel-title">All customers (' + customers.length + ')</div>';
  if (customers.length === 0) {
    html += '<div class="empty">No customers yet</div>';
  } else {
    html += '<table><thead><tr><th>Phone</th><th>Name</th><th>Balance</th><th>Orders</th><th>Spent</th><th>Status</th><th>Joined</th></tr></thead><tbody>';
    customers.forEach(function(cu) {
      html += '<tr>' +
        '<td class="strong">' + (cu.phone || "—") + '</td>' +
        '<td>' + (cu.name || "—") + '</td>' +
        '<td>' + (cu.balance_minutes || 0) + ' min</td>' +
        '<td>' + (cu.total_orders || 0) + '</td>' +
        '<td>' + fmtMoney(cu.total_spent) + '</td>' +
        '<td>' + statusBadge(cu.status) + '</td>' +
        '<td>' + fmtDate(cu.created_at) + '</td>' +
        '</tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div>';
  setContent(html);
}

// ── ORDERS PAGE ────────────────────────────────────────
async function loadOrders() {
  setContent('<div class="loading">Loading orders...</div>');
  try {
    var res = await fetch(BASE + "/api/admin/orders");
    if (!res.ok) throw new Error("Server returned " + res.status);
    var orders = await res.json();
    renderOrders(orders);
  } catch (e) {
    setContent('<div class="empty">Error: ' + e.message + '</div>');
  }
}

function renderOrders(orders) {
  var html = '<div class="panel"><div class="panel-title">All orders (' + orders.length + ')</div>';
  if (orders.length === 0) {
    html += '<div class="empty">No orders yet</div>';
  } else {
    html += '<table><thead><tr><th>Order ID</th><th>Customer</th><th>Product</th><th>Price</th><th>Status</th><th>Est. delivery</th><th>Date</th></tr></thead><tbody>';
    orders.forEach(function(o) {
      html += '<tr>' +
        '<td class="strong" style="font-size:11px">' + (o.order_id || "—") + '</td>' +
        '<td>' + (o.customer_phone || "—") + '</td>' +
        '<td>' + truncate(o.product_title, 24) + '</td>' +
        '<td>' + (o.product_price || "—") + '</td>' +
        '<td>' + statusBadge(o.status) + '</td>' +
        '<td>' + (o.estimated_delivery || "—") + '</td>' +
        '<td>' + fmtDate(o.created_at) + '</td>' +
        '</tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div>';
  setContent(html);
}

// ── COSTS PAGE ─────────────────────────────────────────
async function loadCosts() {
  setContent('<div class="loading">Loading cost data...</div>');
  try {
    var res = await fetch(BASE + "/api/admin/costs");
    if (!res.ok) throw new Error("Server returned " + res.status);
    var data = await res.json();
    if (data.error) throw new Error(data.error);
    renderCosts(data);
  } catch (e) {
    setContent('<div class="empty">Error loading costs: ' + e.message + '<br><br>This page will populate after calls are made.</div>');
  }
}

function renderCosts(data) {
  var t = data.totals || {};
  var margin = parseFloat(t.total_revenue) > 0 ? ((parseFloat(t.total_profit) / parseFloat(t.total_revenue)) * 100).toFixed(1) : "0";
  var html = '';

  html += '<div class="stats-grid">';
  html += statCard("Total revenue", fmtMoney(t.total_revenue), (t.call_count || 0) + " calls tracked");
  html += statCard("Total cost", fmtMoney(t.total_cost), "all providers combined");
  html += statCard("Net profit", fmtMoney(t.total_profit), margin + "% margin");
  html += statCard("Avg cost/call", fmtMoney((parseFloat(t.total_cost) || 0) / Math.max(1, parseInt(t.call_count) || 1)), "across all calls");
  html += '</div>';

  html += '<div class="panel"><div class="panel-title">Cost breakdown by provider</div>';
  var byProvider = data.byProvider || [];
  if (byProvider.length === 0) {
    html += '<div class="empty">No cost events recorded yet — make a call to start tracking</div>';
  } else {
    html += '<table><thead><tr><th>Provider</th><th>Type</th><th>Count</th><th>Total cost</th></tr></thead><tbody>';
    byProvider.forEach(function(row) {
      html += '<tr><td class="strong">' + capitalize(row.provider) + '</td><td>' + (row.event_type || "").replace(/_/g, " ") + '</td><td>' + row.count + '</td><td>' + fmtMoney(row.total) + '</td></tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div>';

  html += '<div class="panel"><div class="panel-title">Per-call profit breakdown</div>';
  var perCall = data.perCall || [];
  if (perCall.length === 0) {
    html += '<div class="empty">No calls with cost data yet</div>';
  } else {
    html += '<table><thead><tr><th>Phone</th><th>Duration</th><th>Cost</th><th>Revenue</th><th>Profit</th><th>Date</th></tr></thead><tbody>';
    perCall.forEach(function(c) {
      var profit = parseFloat(c.profit) || 0;
      var color = profit >= 0 ? "var(--green)" : "var(--red)";
      html += '<tr>' +
        '<td class="strong">' + (c.customer_phone || "—") + '</td>' +
        '<td>' + Math.round((c.duration_seconds || 0) / 60) + ' min</td>' +
        '<td>' + fmtMoney(c.total_cost) + '</td>' +
        '<td>' + fmtMoney(c.revenue) + '</td>' +
        '<td style="color:' + color + '">' + fmtMoney(c.profit) + '</td>' +
        '<td>' + fmtDate(c.created_at) + '</td>' +
        '</tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div>';

  setContent(html);
}

function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ""; }
</script>
</body>
</html>
